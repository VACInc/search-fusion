name: Package Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.12.0
    with:
      dry_run: false
      source: VACInc/openclaw-search-fusion
      ref: ${{ github.ref_name }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
